<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Email</title>
</head>
<body style="margin: 0; padding: 0; background-color: #121212;">

    <!-- Outer Table (Full Width Background) -->
    <table role="presentation" width="100%" cellspacing="0" cellpadding="0" border="0" style="background-color: #121212; padding: 20px;">
        <tr>
            <td align="center">

                <!-- Email Container -->
                <table role="presentation" width="600" cellspacing="0" cellpadding="0" border="0" style="
                    background: linear-gradient(135deg, #1E1E2F, #111111);
                    border-radius: 15px;
                    overflow: hidden;
                    box-shadow: 0px 4px 15px rgba(0, 0, 0, 0.4);
                    color: #FFFFFF;
                    font-family: Arial, sans-serif;
                ">

                    <!-- HEADER -->
                    <tr>
                        <td align="center" style="padding: 30px; font-size: 26px; font-weight: bold;">
                            {{ heading }}
                        </td>
                    </tr>

                    <!-- SUBHEADING -->
                    <tr>
                        <td align="center" style="font-size: 20px; color: #BBBBBB; padding: 15px;">
                            {{ subheading }}
                        </td>
                    </tr>

                    <!-- CONTENT -->
                    <tr>
                        <td align="center" style="padding: 25px; font-size: 16px; line-height: 1.6; color: #DDDDDD;">
                            {{ body }}
                        </td>
                    </tr>

                    <!-- BUTTON (With 3D Hover Effect) -->
                    {% block main_button %}
                    <tr>
                        <td align="center" style="padding: 25px;">
                            <a href="{% resolve 'home' fallback_url='#' %}" style="
                                display: inline-block;
                                background: linear-gradient(135deg, #4B4E75, #1E1E2F);
                                color: #FFFFFF;
                                padding: 14px 28px;
                                font-size: 16px;
                                font-weight: bold;
                                text-decoration: none;
                                border-radius: 8px;
                                box-shadow: 0px 4px 10px rgba(0, 0, 0, 0.3);
                                transition: all 0.3s ease-in-out;
                            "
                            onmouseover="this.style.transform='scale(1.05)'; this.style.boxShadow='0px 6px 12px rgba(0, 0, 0, 0.5)';"
                            onmouseout="this.style.transform='scale(1)'; this.style.boxShadow='0px 4px 10px rgba(0, 0, 0, 0.3)';">
                                Visit Yannick 🚀
                            </a>
                        </td>
                    </tr>
                    {% endblock main_button %}

                    <!-- FOOTER -->
                    <tr>
                        <td align="center" style="background-color: #000000; padding: 15px; font-size: 14px; color: #777777;">
                            &copy; 2025 Yannick Consultancy | <a href="{% resolve 'home' fallback_url='#' %}" style="color: #4B4E75; text-decoration: none;">Visit site</a>
                        </td>
                    </tr>

                </table>

            </td>
        </tr>
    </table>

</body>
</html>
